spring.application.name=first

# H2 in-memory database  resets on every restart (seed data re-applied automatically)
spring.datasource.url=jdbc:h2:mem:firstdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create/drop the schema on each run
spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# Disable open-in-view  database sessions must not bleed into view rendering
spring.jpa.open-in-view=false

# H2 web console  reachable at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console